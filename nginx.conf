server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /wk-cb/ {
        try_files $uri $uri/ /wk-cb/index.html;
    }

    # Forzar content-type correcto para JS
    types {
        application/javascript js;
        text/css css;
        text/html html;
    }

    location ~* \.js$ {
        try_files $uri =404;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }
}