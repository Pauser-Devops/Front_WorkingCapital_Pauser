<div class="wk-layout">

  <app-sidebar [vistaActiva]="vista" (vistaChange)="setVista($event)">

    <!-- botón cargar Excel vive en el footer del sidebar -->
    <label class="wk-btn-load">
      Cargar Excel
      <input type="file" accept=".xlsx,.xls" (change)="onFile($event)" hidden>
    </label>
    <div class="wk-loaded" *ngIf="datosApi">Datos cargados</div>

  </app-sidebar>

  <main class="wk-main">

    <app-header [vistaNombre]="vistaNombre" [datosApi]="datosApi" (exportar)="exportar()">
    </app-header>

    <app-wk-semanal *ngIf="vista === 'semanal'" #wkSemanal></app-wk-semanal>
    <app-wk-mensual *ngIf="vista === 'mensual'" #wkMensual></app-wk-mensual>
    <app-ingresos *ngIf="vista === 'ingresos'"></app-ingresos>
    <app-egresos *ngIf="vista === 'egresos'"></app-egresos>
    <app-stock-vs-cxp *ngIf="vista === 'stock'"></app-stock-vs-cxp>
    <div class="wk-coming"
      *ngIf="vista !== 'semanal' && vista !== 'mensual' && vista !== 'ingresos' && vista !== 'egresos' && vista !== 'stock'">

      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="23" stroke="#0070C0" stroke-width="2" fill="#EBF3FB" />
        <path d="M26 15v11l7 4" stroke="#0070C0" stroke-width="2.5" stroke-linecap="round" />
      </svg>
      <div class="wk-coming-title">{{ vistaNombre }}</div>
      <div class="wk-coming-desc">
        Esta vista se conectará a <strong>SharePoint / OneDrive</strong> de la empresa.
      </div>
    </div>
  </main>
</div>
