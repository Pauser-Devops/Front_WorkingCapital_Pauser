<div class="rp-wrap">

  <!-- HEADER -->
  <div class="rp-header">
    <div class="rp-header-left">
      <div class="rp-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
      </div>
      <div>
        <div class="rp-title">Renta y Proyección</div>
        <div class="rp-subtitle">Pago a cuenta mensual · {{ anio }}</div>
      </div>
    </div>

    <!-- Selector de año -->
    <div class="rp-anio-selector">
      <button class="rp-anio-btn" (click)="cambiarAnio(-1)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <span class="rp-anio-label">{{ anio }}</span>
      <button class="rp-anio-btn" (click)="cambiarAnio(1)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="rp-loading" *ngIf="cargando">
    <div class="rp-spinner"></div>
    <span>Cargando datos...</span>
  </div>

  <!-- ERROR -->
  <div class="rp-error" *ngIf="error && !cargando">{{ error }}</div>

  <!-- TABLA -->
  <div class="rp-tabla-wrap" *ngIf="!cargando && !error">
    <table class="rp-tabla">
      <thead>
        <tr>
          <th class="rp-th-mes">Mes</th>
          <th class="rp-th">Ventas</th>
          <th class="rp-th rp-th-pct">%</th>
          <th class="rp-th">Renta</th>
          <th class="rp-th">Créd. Anual</th>
          <th class="rp-th">Saldo</th>
          <th class="rp-th-estado"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of filas; trackBy: trackByMes" class="rp-row" [class.rp-row-con-datos]="f.ventas != null">

          <!-- Mes -->
          <td class="rp-td-mes">{{ nombreMes(f.mes) }}</td>

          <!-- Ventas - editable con formato miles/decimales -->
          <td class="rp-td rp-td-editable">
            <input
              class="rp-input"
              type="text"
              inputmode="decimal"
              placeholder="—"
              [value]="fmtInput(f.ventas)"
              (focus)="onVentasFocus($event)"
              (blur)="onVentasBlur(f, $event)" />
          </td>

          <!-- % fijo -->
          <td class="rp-td rp-td-pct">1.50%</td>

          <!-- Renta - calculado -->
          <td class="rp-td rp-td-calculado">
            <span [class.rp-vacio]="f.renta == null">{{ fmt(f.renta) }}</span>
          </td>

          <!-- Créd Anual - editable con formato miles/decimales -->
          <td class="rp-td" [class.rp-td-editable]="f.cred_anual != null || f.mes === 1">
            <input
              class="rp-input rp-input-cred"
              type="text"
              inputmode="decimal"
              placeholder="—"
              [value]="fmtInput(f.cred_anual)"
              (focus)="onCredFocus($event)"
              (blur)="onCredBlur(f, $event)" />
          </td>

          <!-- Saldo - calculado -->
          <td class="rp-td rp-td-calculado" [class.rp-saldo-neg]="f.saldo != null && f.saldo < 0">
            <span [class.rp-vacio]="f.saldo == null">{{ fmt(f.saldo) }}</span>
          </td>

          <!-- Indicador guardando -->
          <td class="rp-td-estado">
            <div class="rp-spinner-sm" *ngIf="guardando[f.mes]"></div>
          </td>

        </tr>
      </tbody>

      <!-- TOTALES -->
      <tfoot>
        <tr class="rp-row-total">
          <td class="rp-td-mes">PAGO A CUENTA {{ anio }}</td>
          <td class="rp-td rp-td-calculado"><strong>{{ fmt(totalVentas) }}</strong></td>
          <td class="rp-td"></td>
          <td class="rp-td rp-td-calculado"><strong>{{ fmt(totalRenta) }}</strong></td>
          <td class="rp-td"></td>
          <td class="rp-td rp-td-calculado"><strong>{{ fmt(totalSaldo) }}</strong></td>
          <td class="rp-td-estado"></td>
        </tr>
      </tfoot>
    </table>
  </div>

</div>
