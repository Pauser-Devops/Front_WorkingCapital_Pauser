<div class="wk-topbar">
  <div class="wk-breadcrumb">
    Working Capital <strong>/ {{ vistaNombre }}</strong>
  </div>
  <div class="wk-topbar-right">
    <div class="wk-status" [class.wk-status-on]="datosApi">
      <span class="wk-dot"></span>
      {{ datosApi ? 'Datos cargados' : 'Vista previa' }}
    </div>
    <button class="wk-btn-export" (click)="exportar.emit()">
      Exportar Excel
    </button>
  </div>
</div>
